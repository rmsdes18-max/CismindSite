<svg xmlns="http://www.w3.org/2000/svg" width="110mm" height="40mm" viewBox="0 0 1100 400" font-family="'Mulish', 'Inter', sans-serif">
  <!-- Background -->
  <rect width="1100" height="400" fill="#f5ece0"/>

  <!-- Top color strip (CISMIND brand gradient) -->
  <rect x="0" y="0" width="275" height="18" fill="#ffa300"/>
  <rect x="275" y="0" width="275" height="18" fill="#e70050"/>
  <rect x="550" y="0" width="275" height="18" fill="#652f7d"/>
  <rect x="825" y="0" width="275" height="18" fill="#202b38"/>

  <!-- Bottom color strip -->
  <rect x="0" y="382" width="275" height="18" fill="#202b38"/>
  <rect x="275" y="382" width="275" height="18" fill="#652f7d"/>
  <rect x="550" y="382" width="275" height="18" fill="#e70050"/>
  <rect x="825" y="382" width="275" height="18" fill="#ffa300"/>

  <!-- LEFT SECTION: Brand -->
  <g transform="translate(40, 50)">
    <!-- CISMIND wordmark -->
    <text x="0" y="70" font-size="72" font-weight="800" fill="#202b38" letter-spacing="-2">CISMIND</text>
    <text x="0" y="110" font-size="22" font-weight="600" fill="#445e79" letter-spacing="1">PRINT &amp; DESIGN</text>

    <!-- Separator dot -->
    <circle cx="6" cy="145" r="4" fill="#e70050"/>

    <!-- Made in -->
    <text x="0" y="180" font-size="20" font-weight="700" fill="#202b38" letter-spacing="0.5">MADE IN ROMANIA</text>
    <text x="0" y="210" font-size="18" font-weight="500" fill="#445e79">Personalizare DTF</text>
    <text x="0" y="235" font-size="18" font-weight="500" fill="#445e79">cismind.ro</text>

    <!-- Composition tag -->
    <text x="0" y="285" font-size="16" font-weight="700" fill="#202b38" letter-spacing="0.5">COMPOZITIE</text>
    <text x="0" y="308" font-size="18" font-weight="500" fill="#445e79">100% Bumbac</text>
  </g>

  <!-- DIVIDER vertical -->
  <line x1="450" y1="55" x2="450" y2="345" stroke="#c9bcd4" stroke-width="2" stroke-dasharray="4 4"/>

  <!-- RIGHT SECTION: Care symbols + instructions -->
  <g transform="translate(490, 50)">
    <text x="0" y="22" font-size="18" font-weight="700" fill="#202b38" letter-spacing="0.8">INSTRUCTIUNI DE INGRIJIRE</text>

    <!-- Row 1: 5 care symbols -->
    <g transform="translate(0, 55)">

      <!-- Symbol 1: Wash at 30°C -->
      <g transform="translate(0, 0)">
        <!-- Wash tub shape -->
        <path d="M 5 15 Q 5 5 15 5 L 75 5 Q 85 5 85 15 L 80 55 Q 80 65 70 65 L 20 65 Q 10 65 10 55 Z"
              fill="none" stroke="#202b38" stroke-width="3.5" stroke-linejoin="round"/>
        <text x="45" y="48" font-size="26" font-weight="800" fill="#202b38" text-anchor="middle">30</text>
        <text x="45" y="95" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">30°C MAX</text>
      </g>

      <!-- Symbol 2: Do not bleach -->
      <g transform="translate(110, 0)">
        <path d="M 45 5 L 85 60 L 5 60 Z" fill="none" stroke="#202b38" stroke-width="3.5" stroke-linejoin="round"/>
        <line x1="15" y1="15" x2="75" y2="55" stroke="#e70050" stroke-width="4" stroke-linecap="round"/>
        <line x1="75" y1="15" x2="15" y2="55" stroke="#e70050" stroke-width="4" stroke-linecap="round"/>
        <text x="45" y="95" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">FARA INALBITOR</text>
      </g>

      <!-- Symbol 3: Tumble dry low -->
      <g transform="translate(220, 0)">
        <rect x="5" y="5" width="80" height="60" rx="4" fill="none" stroke="#202b38" stroke-width="3.5"/>
        <circle cx="45" cy="35" r="22" fill="none" stroke="#202b38" stroke-width="3.5"/>
        <circle cx="45" cy="35" r="4" fill="#202b38"/>
        <text x="45" y="95" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">USCARE BLANDA</text>
      </g>

      <!-- Symbol 4: Iron low (1 dot) -->
      <g transform="translate(330, 0)">
        <path d="M 10 50 L 15 25 Q 17 15 27 15 L 80 15 Q 90 17 85 30 L 80 50 Z"
              fill="none" stroke="#202b38" stroke-width="3.5" stroke-linejoin="round"/>
        <line x1="10" y1="55" x2="85" y2="55" stroke="#202b38" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="47" cy="32" r="4" fill="#202b38"/>
        <text x="47" y="95" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">CALCARE SLABA</text>
      </g>

      <!-- Symbol 5: Do not dry clean -->
      <g transform="translate(440, 0)">
        <circle cx="45" cy="35" r="30" fill="none" stroke="#202b38" stroke-width="3.5"/>
        <line x1="18" y1="8" x2="72" y2="62" stroke="#e70050" stroke-width="4" stroke-linecap="round"/>
        <line x1="72" y1="8" x2="18" y2="62" stroke="#e70050" stroke-width="4" stroke-linecap="round"/>
        <text x="45" y="95" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">FARA CURATARE</text>
        <text x="45" y="110" font-size="14" font-weight="700" fill="#445e79" text-anchor="middle">CHIMICA</text>
      </g>
    </g>

    <!-- Divider line -->
    <line x1="0" y1="205" x2="530" y2="205" stroke="#e0d9e6" stroke-width="1.5"/>

    <!-- Text instructions -->
    <g transform="translate(0, 230)">
      <!-- Pink bullet -->
      <circle cx="6" cy="10" r="3" fill="#e70050"/>
      <text x="18" y="15" font-size="16" font-weight="600" fill="#202b38">Spalati produsul intors pe dos</text>

      <circle cx="6" cy="38" r="3" fill="#e70050"/>
      <text x="18" y="43" font-size="16" font-weight="600" fill="#202b38">Nu calcati direct peste print</text>

      <circle cx="6" cy="66" r="3" fill="#e70050"/>
      <text x="18" y="71" font-size="16" font-weight="600" fill="#202b38">Evitati frecarea imprimeului</text>

      <circle cx="6" cy="94" r="3" fill="#e70050"/>
      <text x="18" y="99" font-size="16" font-weight="600" fill="#202b38">Uscare la umbra, naturala</text>
    </g>
  </g>
</svg>
